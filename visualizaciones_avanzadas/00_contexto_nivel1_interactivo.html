<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { margin: 0; font-family: "Söhne", "Soehne", "ui-sans-serif", -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif; background: #fff; color: #111; }
.wrap { padding: 10px; }
.toolbar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
button {
  border: 1px solid #e5e7eb;
  background: #fff;
  border-radius: 10px;
  padding: 8px 12px;
  font-size: 13px;
  cursor: pointer;
}
button.active {
  background: #111;
  color: #fff;
  border-color: #111;
}
iframe {
  width: 100%;
  height: 760px;
  border: 0;
  border-radius: 10px;
}
@media (max-width: 900px) {
  iframe { height: 980px; }
}
</style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar" id="toolbar"></div>
    <iframe id="panel" src="./00_contexto_nivel1_Nacional.html" loading="eager"></iframe>
  </div>
<script>
(function () {
  var labels = ["Nacional", "Lima/Callao", "Norte", "Sur", "Centro", "Oriente"];
  var files = [
    "./00_contexto_nivel1_Nacional.html",
    "./00_contexto_nivel1_Lima_Callao.html",
    "./00_contexto_nivel1_Norte.html",
    "./00_contexto_nivel1_Sur.html",
    "./00_contexto_nivel1_Centro.html",
    "./00_contexto_nivel1_Oriente.html"
  ];
  var toolbar = document.getElementById("toolbar");
  var panel = document.getElementById("panel");
  var i;

  function setActiveButton(activeButton) {
    var buttons = toolbar.getElementsByTagName("button");
    var j;
    for (j = 0; j < buttons.length; j += 1) {
      buttons[j].className = buttons[j] === activeButton ? "active" : "";
    }
  }

  function setPanel(index) {
    panel.src = files[index] + "?v=" + Date.now();
  }

  for (i = 0; i < labels.length; i += 1) {
    (function (idx) {
      var button = document.createElement("button");
      button.textContent = labels[idx];
      if (idx === 0) button.className = "active";
      button.onclick = function () {
        setPanel(idx);
        setActiveButton(button);
      };
      toolbar.appendChild(button);
    })(i);
  }

  setPanel(0);
})();
</script>
</body>
</html>
