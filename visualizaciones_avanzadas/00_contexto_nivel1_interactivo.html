<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{margin:0;font-family:Inter,Arial,sans-serif;background:#fff;color:#111} .wrap{padding:10px} .toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px} button{border:1px solid #e5e7eb;background:#fff;border-radius:10px;padding:8px 12px;font-size:13px;cursor:pointer} button.active{background:#10A37F;color:#fff;border-color:#10A37F} iframe{width:100%;height:760px;border:1px solid #e5e7eb;border-radius:10px} @media (max-width:900px){iframe{height:980px}}</style>
</head><body><div class="wrap"><div class="toolbar" id="toolbar"></div><iframe id="panel" src="./00_contexto_nivel1_Nacional.html" loading="lazy"></iframe></div>
<script>const labels= ["Nacional","Lima/Callao","Norte","Sur","Centro","Oriente"] ; const files= ["./00_contexto_nivel1_Nacional.html","./00_contexto_nivel1_Lima_Callao.html","./00_contexto_nivel1_Norte.html","./00_contexto_nivel1_Sur.html","./00_contexto_nivel1_Centro.html","./00_contexto_nivel1_Oriente.html"] ; const tb=document.getElementById("toolbar"), panel=document.getElementById("panel"); labels.forEach((lab,i)=>{const b=document.createElement("button"); b.textContent=lab; if(i===0)b.className="active"; b.onclick=()=>{panel.src=files[i]+"?v="+Date.now(); [...tb.children].forEach(x=>x.classList.remove("active")); b.classList.add("active");}; tb.appendChild(b);});</script></body></html>
